name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION_PATH: QaaS.Common.Generators.sln
  PROJECT_TO_PACK: QaaS.Common.Generators/QaaS.Common.Generators.csproj
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}\BuildOutput

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test solution
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore --maxcpucount

      - name: Validate package metadata
        shell: powershell
        run: |
          [xml]$csproj = Get-Content "${{ env.PROJECT_TO_PACK }}"
          $properties = $csproj.Project.PropertyGroup
          if ($null -eq $properties.Description -or [string]::IsNullOrWhiteSpace($properties.Description)) {
            throw "Packed project must include <Description>."
          }
          if ($properties.PackageReadmeFile -ne "README.md") {
            throw "Packed project must include <PackageReadmeFile>README.md</PackageReadmeFile>."
          }
          if ($properties.IncludeSymbols -ne "true") {
            throw "Packed project must include symbols (<IncludeSymbols>true</IncludeSymbols>)."
          }
          if ($properties.SymbolPackageFormat -ne "snupkg") {
            throw "Packed project must generate snupkg (<SymbolPackageFormat>snupkg</SymbolPackageFormat>)."
          }
          $readmeItem = $csproj.Project.ItemGroup.None |
            Where-Object { $_.Include -eq "..\README.md" -and $_.Pack -eq "true" -and $_.PackagePath -eq "/" }
          if ($null -eq $readmeItem) {
            throw "Packed project must pack the solution README into the package root."
          }

      # --- DEPLOYMENT STEPS (Run only on tags) ---

      - name: Get Version
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        uses: battila7/get-version-action@v2

      - name: Validate SemVer tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version-without-v }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)\.[0-9]+)?$ ]]; then
            echo "Error: '$VERSION' is not a valid version."
            exit 1
          fi

      - name: Pack QaaS.Common.Generators
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet pack ${{ env.PROJECT_TO_PACK }} `
            --no-restore `
            --configuration ${{ env.CONFIGURATION }} `
            --include-symbols `
            -p:PackageVersion=${{ steps.version.outputs.version-without-v }} `
            --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Push QaaS.Common.Generators to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $mainPackages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}\QaaS.Common.Generators.*.nupkg" |
            Where-Object { $_.Name -match "^QaaS\.Common\.Generators\.[0-9]" -and $_.Name -notmatch "\.symbols\.nupkg$" }
          foreach ($package in $mainPackages) {
            dotnet nuget push $package.FullName -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json

            $symbolPackageName = [System.IO.Path]::GetFileNameWithoutExtension($package.Name) + ".snupkg"
            $symbolPackagePath = Join-Path $package.DirectoryName $symbolPackageName
            if (Test-Path $symbolPackagePath) {
              dotnet nuget push $symbolPackagePath -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json
            } else {
              throw "Expected symbol package was not found: $symbolPackagePath"
            }
          }
